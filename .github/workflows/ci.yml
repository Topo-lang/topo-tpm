name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the upstream topo-core ref this build is tested against. Bump
  # whenever a new compatible topo-core tag ships.
  TOPO_CORE_REF: main

jobs:
  # ── Build + test against an installed topo-core ────────
  build-and-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    steps:
      - uses: actions/checkout@v5

      - name: Install build deps (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ninja-build

      - name: Install build deps (macos)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Export GHA cache env (for vcpkg x-gha backend)
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Matches the `builtin-baseline` pinned in vcpkg.json. Bump both
          # together when refreshing the vcpkg snapshot.
          vcpkgGitCommitId: "56bb2411609227288b70117ead2c47585ba07713"

      # Cache the topo-core install so PRs don't re-build it every time.
      # Keyed on TOPO_CORE_REF so a bump to a new ref invalidates the cache.
      - name: Cache topo-core install
        id: topo-core-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/topo-install
          key: topo-core-${{ env.TOPO_CORE_REF }}-${{ matrix.os }}-v1

      - name: Build & install topo-core
        if: steps.topo-core-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${TOPO_CORE_REF}" \
              https://github.com/topo-lang/topo-core.git \
              "${RUNNER_TEMP}/topo-core-src"
          cmake -S "${RUNNER_TEMP}/topo-core-src" \
                -B "${RUNNER_TEMP}/topo-core-build" \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/topo-install" \
                -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
                -DTOPO_ENABLE_LLVM=OFF
          cmake --build "${RUNNER_TEMP}/topo-core-build" --target install

      - name: Configure topo-tpm
        run: |
          cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/topo-install" \
              -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120

      # Smoke test: install topo-tpm, then verify a downstream
      # `find_package(topo-tpm)` resolves and links cleanly.
      - name: Install topo-tpm
        run: cmake --install build --prefix "${RUNNER_TEMP}/tpm-install"

      - name: find_package smoke
        run: |
          mkdir -p "${RUNNER_TEMP}/find-package-smoke"
          cd "${RUNNER_TEMP}/find-package-smoke"
          # The smoke project needs its own vcpkg manifest: the installed
          # package's Config.cmake chain transitively requires nlohmann_json,
          # so the consumer must arrange for that dep itself. Pinning the
          # same builtin-baseline reuses the cached vcpkg build.
          cat > vcpkg.json <<'JSON'
          {
            "name": "find-package-smoke",
            "version-string": "0.0.0",
            "builtin-baseline": "56bb2411609227288b70117ead2c47585ba07713",
            "dependencies": ["nlohmann-json"]
          }
          JSON
          cat > CMakeLists.txt <<'CMAKE'
          cmake_minimum_required(VERSION 3.20)
          project(tpm-find-package-smoke LANGUAGES CXX)
          find_package(topo-tpm CONFIG REQUIRED)
          add_executable(smoke smoke.cpp)
          target_link_libraries(smoke PRIVATE topo::tpm::TpmLib)
          if(MINGW)
              target_link_options(smoke PRIVATE -static -static-libgcc -static-libstdc++)
          endif()
          CMAKE
          cat > smoke.cpp <<'CPP'
          #include <tpm/SemVer.h>
          int main() {
              auto v = tpm::SemVer::parse("1.2.3");
              return (v && v->major == 1 && v->minor == 2 && v->patch == 3) ? 0 : 1;
          }
          CPP
          cmake -S . -B build -G Ninja \
              -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/tpm-install;${RUNNER_TEMP}/topo-install" \
              -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          cmake --build build
          ./build/smoke
